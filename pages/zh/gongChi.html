  <body>
    <div class="block block__translator">
      <a href="../en/gongChi.html"><p>繁中 | EN</p></a>
    </div>
    <project-header
      tags="Animated,Interactive"
      title="工尺 - 北管樂混音器操作展示網站"
      duration="Jul. 2021 ~ Aug. 2021"
      role="Frontend Developer"
      responsibility="前端切版、發聲操作功能"
      company="自行接案"
    ></project-header>

    <project-introduction
      image-url="../../img/image-projectCover-gongChi.webp"
      image-alt="工尺 - 北管樂混音器操作展示網站"
      purpose="以步驟式教學說明各按鍵用途，搭配自由遊玩模式，模擬實體北管樂混音器「工尺」的操作效果。"
      production="以網站動畫與 tone.js 套件，讓使用者在平板上以多點觸控達到升降調、錄音、混音、演奏…等混音器操作效果。"
    ></project-introduction>
    <section class="section section--content">
      <div class="container container--content">
        <div class="container container--contentSection">
          <div class="module module__bgTitle">
            <h3 class="module__bgText">專案背景</h3>
            <div class="module__line"></div>
          </div>
          <div class="module module__doubleImage">
            <img
              src="../../img/projects/gongChi/image-gongChi-demo1.webp"
              alt=""
              data-zoom-image
            />
            <img
              src="../../img/projects/gongChi/image-gongChi-demo2.webp"
              alt=""
              data-zoom-image
            />
          </div>
          <div class="module module__pureText">
            <p class="module__text">
              此為台灣科技大學畢業生 - 設計系工業設計組王駿騰、
              陳錡淵的畢業製作作品之展示網站。該作品將台灣民俗文化之一：北管樂的音色、樂器等元素與西方音樂常見的混音器結合，創造出北管樂混音器「工尺」。
            </p>
          </div>
        </div>
        <div class="container container--contentSection">
          <div class="module module__bgTitle">
            <h3 class="module__bgText">成果展示</h3>
            <div class="module__line"></div>
          </div>
          <div class="module module__pureText">
            <p class="module__text">
              因本網站專為觸控式螢幕做設計，且為保持使用者良好的體驗，僅以
              1366*768 做設計，以避操作操作區過小造成使用者操作上的不便。
              若以電腦操作，請以 chrome 開發者工具中模擬觸控模式進行操作。
            </p>
            <div class="module__button">
              <a href="https://ntust-music-project.onrender.com" target="_blank"
                ><p>網站連結</p></a
              >
            </div>

              alt=""
              data-zoom-image
            />

          <div class="module module__singleImage">
            <img
              src="../../img/projects/gongChi/image-gongChi-demo4.webp"
              alt=""
              data-zoom-image
            />
          </div>
